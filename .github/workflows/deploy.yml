name: Deploy to GitHub Pages

# Production deploys to the ROOT of the gh-pages branch. PR previews
# (see preview.yml) live in pr-preview/pr-<N>/ on the same branch, so this
# job must NOT wipe them — hence clean-exclude below. GitHub Pages must be
# configured to serve from the gh-pages branch (root) for this to go live.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      # Branch-served Pages runs Jekyll unless told not to; Vite output has no
      # underscore dirs today, but this is cheap insurance at the branch root.
      - run: touch dist/.nojekyll
      - name: Deploy to gh-pages root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          clean-exclude: |
            pr-preview/
